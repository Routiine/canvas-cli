version: "1.0.0"
title: "Security Audit"
description: "Comprehensive security analysis and remediation for your codebase"
author: "Canvas CLI Security Team"
tags:
  - "security"
  - "audit"
  - "vulnerability"
  - "scanning"
  - "compliance"

instructions: |
  This recipe performs a comprehensive security audit of your codebase:
  - OWASP Top 10 vulnerability scanning
  - Dependency vulnerability analysis
  - Code injection detection
  - Authentication/authorization review
  - Sensitive data exposure scanning
  - Security configuration analysis
  - Compliance checking

parameters:
  - key: project_path
    input_type: directory
    requirement: required
    description: "Path to the project to audit"
    default: "."

  - key: scan_depth
    input_type: select
    requirement: optional
    description: "Depth of security scan"
    default: "comprehensive"
    options:
      - "basic"
      - "standard"
      - "comprehensive"
      - "paranoid"

  - key: compliance_standards
    input_type: multiselect
    requirement: optional
    description: "Compliance standards to check against"
    options:
      - "OWASP"
      - "GDPR"
      - "HIPAA"
      - "SOC2"
      - "PCI-DSS"
      - "ISO-27001"

  - key: fix_vulnerabilities
    input_type: boolean
    requirement: optional
    description: "Automatically fix detected vulnerabilities?"
    default: "false"

  - key: generate_report
    input_type: boolean
    requirement: optional
    description: "Generate detailed security report?"
    default: "true"

  - key: report_format
    input_type: select
    requirement: optional
    description: "Format for security report"
    default: "markdown"
    options:
      - "markdown"
      - "html"
      - "json"
      - "pdf"

prompt: |
  Perform a {{ scan_depth }} security audit on the project at {{ project_path }}.
  
  Security Analysis Tasks:
  1. Scan for OWASP Top 10 vulnerabilities
  2. Check all dependencies for known CVEs
  3. Detect potential injection vulnerabilities (SQL, XSS, command injection)
  4. Review authentication and authorization implementations
  5. Find hardcoded secrets, API keys, and credentials
  6. Analyze security headers and CORS configuration
  7. Check for insecure data storage and transmission
  8. Review error handling for information disclosure
  
  {% if compliance_standards %}
  Compliance Checks:
  {% for standard in compliance_standards %}
  - Verify compliance with {{ standard }} requirements
  {% endfor %}
  {% endif %}
  
  {% if fix_vulnerabilities %}
  For each vulnerability found:
  - Provide a fix or patch
  - Update vulnerable dependencies
  - Implement security best practices
  {% endif %}
  
  {% if generate_report %}
  Generate a detailed security report in {{ report_format }} format including:
  - Executive summary
  - Vulnerability details with severity ratings
  - Remediation recommendations
  - Compliance status
  {% endif %}

system_prompt: |
  You are a senior security engineer with expertise in application security, 
  vulnerability assessment, and compliance. You follow OWASP guidelines and 
  industry best practices for secure coding. You provide actionable 
  recommendations and can implement security fixes when needed.

tools:
  - "shell"
  - "file"
  - "git"
  - "web"

model_preferences:
  preferred_models:
    - "claude-3-opus"
    - "gpt-4"
  min_context_length: 16384
  requires_tools: true

execution:
  max_iterations: 20
  timeout: 600
  parallel: true

examples:
  - name: "Basic Security Scan"
    description: "Quick security scan for a Node.js project"
    parameters:
      project_path: "./my-app"
      scan_depth: "basic"
      fix_vulnerabilities: "false"
      generate_report: "true"
      report_format: "markdown"
    expected_output: "Security report with identified vulnerabilities and recommendations"

  - name: "Comprehensive Audit with Fixes"
    description: "Full security audit with automatic remediation"
    parameters:
      project_path: "."
      scan_depth: "comprehensive"
      compliance_standards: "OWASP,GDPR"
      fix_vulnerabilities: "true"
      generate_report: "true"
      report_format: "html"
    expected_output: "Fixed vulnerabilities, updated dependencies, and detailed HTML report"